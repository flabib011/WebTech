<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creating a Student Registration Form using HTML</title>
</head>
<body>
    <h1>Registration Form</h1>
    <form action="#" method="post">
        <fieldset>
           <legend>My Information</legend> 
           <label for="fname">Full Name:</label>
           <input type="text" name="fname" id="fname" required>
<br><br>
           <label for="sid">Student ID:</label>
           <input type="text" name="sid" id="sid" required>
           
<br><br>
        <label for="email">Email: </label>
        <input type="email" name="email" id="email" required>
 <br><br>   
            <label for="phone">Phone: </label>
            <input type="tel" name="phone" id="phone" required>
<br><br>
            <label for="dob">Date of Birth: </label>
            <input type="date" name="dob" id="dob" required>
<br><br>
            <form>
                
                <input type="radio" id="male" name="gender" value="male">
                <label for="male">Male</label>
                <input type="radio" id="female" name="gender" value="female">
                <label for="female">Female</label>
                <input type="radio" id="others" name="gender" value="others">
                <label for="others">others</label>
<br><br>

            </fieldset>
                
            <fieldset>
                <label for="ai">Department</label><br>
                <legend>Academic Information</legend>
                
                <select id="department" name="Department">
                    <option value="CSE" selected>CSE</option>
                    <option value="EEE">EEE</option>
                    <option value="BBA">BBA</option>
                    <option value="English">English</option>
                    <option value="Civil Engineering">Civil Engineering</option>
                </select>
<br>

                 <label for="sem">Semester</label><br>
                 <select id="sem" name="Semester">
                    <option value="1" selected>1st Semester</option>
                    <option value="2">2nd Semester</option>
                    <option value="3">3rd Semester</option>
                    <option value="4">4th Semester</option>
                    <option value="5">5th Semester</option>
                    <option value="6">6th Semester</option>
                    <option value="7">7th Semester</option>
                    <option value="8">8th Semester</option>

                </select>
            </fieldset>

            <fieldset>
                 <legend>Skills</legend><br>
                 <label for="skills">Select Programming Languages Known:</label><br>

                <input type="checkbox" id="C" name="language" value="C">
                <label for="C">C</label>
                
                <input type="checkbox" id="C++" name="language" value="C++">
                <label for="C++">C++</label>
                
                <input type="checkbox" id="java" name="language" value="java">
                <label for="java">Java</label>
                
                <input type="checkbox" id="python" name="language" value="python">
                <label for="python">Python</label>

                <input type="checkbox" id="javascript" name="language" value="javascript">
                <label for="javascript">Javascript</label>
                
            </fieldset>

            <fieldset>
            <legend>Additional Informartion </legend>

                <label for="Address">Address:</label>
                <input type="text" name="Address" id="Address" required>
<br><Br>
                <label for="photo">Upload Student Photo</label>
                <input type="file" id="photo" name="photo">
<br><br>

                <label for="comments">Comments/Suggessions</label><br>
                <textarea id="comments" name="comments" rows="5" cols="40" maxlength="200"
                placeholder="Write your comments here..."></textarea>


            </form>
            

            
        </fieldset>
        <input type="submit" value="submit">
        <input type="reset" value="reset">

    </form>
</body>
</html>
